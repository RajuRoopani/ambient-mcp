<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  width: 340px;
  background: #1a1a2e;
  color: #e2e8f0;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 9px;
}
.header-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.header-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.1px;
}
.header-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #6b7280;
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.live { background: #4ade80; }
.status-dot.err  { background: #f87171; }

/* ── Body ── */
.body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }

/* ── Offline banner ── */
.offline-banner {
  display: none;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #fca5a5;
  line-height: 1.5;
}
.offline-banner code {
  font-family: 'Cascadia Code', Consolas, monospace;
  font-size: 11px;
  background: rgba(255,255,255,0.08);
  padding: 1px 5px;
  border-radius: 3px;
}
.offline-banner.show { display: block; }

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.stat {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}
.stat-num {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
  line-height: 1.3;
}

/* ── Section label ── */
.section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 8px;
}

/* ── Page items ── */
.page-list { display: flex; flex-direction: column; }
.page-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.page-item:last-child { border-bottom: none; }
.page-favicon {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  background: rgba(99,102,241,0.2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}
.page-info { flex: 1; min-width: 0; }
.page-title {
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.page-meta {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
}
.page-tag {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  align-self: center;
}

/* ── Token items ── */
.token-list { display: flex; flex-direction: column; }
.token-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.token-item:last-child { border-bottom: none; }
.token-domain {
  flex: 1;
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.token-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 100px;
  flex-shrink: 0;
  white-space: nowrap;
}
.badge-fresh    { background: rgba(74,222,128,0.12);  color: #4ade80; }
.badge-expiring { background: rgba(251,191,36,0.12);  color: #fbbf24; }
.badge-expired  { background: rgba(248,113,113,0.12); color: #f87171; }
.badge-unknown  { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }

/* ── Empty state ── */
.empty {
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  text-align: center;
  padding: 14px 0;
  line-height: 1.5;
}

/* ── Footer actions ── */
.footer {
  display: flex;
  gap: 6px;
  padding-top: 4px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
button {
  flex: 1;
  padding: 7px 10px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.8; }
.btn-primary   { background: rgba(124,58,237,0.3); color: #c4b5fd; border-color: rgba(124,58,237,0.4); }
.btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.1); }
.btn-danger    { background: rgba(248,113,113,0.15); color: #f87171; border-color: rgba(248,113,113,0.3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="header-icon">✦</div>
    <span class="header-title">Ambient MCP</span>
  </div>
  <div class="header-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</div>

<div class="body">

  <div class="offline-banner" id="offline-banner">
    Server offline. Run: <code>npx ambient-mcp</code>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="stat-pages">—</div>
      <div class="stat-lbl">Pages captured</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-tokens">—</div>
      <div class="stat-lbl">Tokens stored</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-fresh">—</div>
      <div class="stat-lbl">Fresh tokens</div>
    </div>
  </div>

  <div>
    <div class="section-title">Recent pages</div>
    <div class="page-list" id="page-list">
      <div class="empty">No pages captured yet.<br>Start browsing to see context here.</div>
    </div>
  </div>

  <div>
    <div class="section-title">Auth tokens</div>
    <div class="token-list" id="token-list">
      <div class="empty">No tokens captured yet.</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary"   id="btn-flush">↑ Flush</button>
    <button class="btn-secondary" id="btn-open">View all →</button>
    <button class="btn-danger"    id="btn-clear">Clear</button>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
